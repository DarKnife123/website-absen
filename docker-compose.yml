services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5010:5010"
    environment:
      - DATABASE_URL=mongodb://mongo:27017/Presensi?replicaSet=rs0&directConnection=true
      - AUTH_SECRET=${AUTH_SECRET:-nrehivnajrnauirgnuoaeaovnraviyerbvain}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:5010}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    restart: unless-stopped

  mongo:
    image: mongo:6
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "5110:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  mongo-init:
    image: mongo:6
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: ["mongosh", "--host", "mongo", "--eval", "try{rs.status()}catch(e){rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]})}"]

volumes:
  mongo_data:
  uploads_data:
