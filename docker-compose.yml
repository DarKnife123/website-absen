services:
  attendance-db:
    image: mongo:4.4
    container_name: attendance-db
    hostname: attendance-db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "5110:27017"
      - "5010:5010" # App port is now here because of shared network stack
    volumes:
      - mongo_data_v6:/data/db
    restart: unless-stopped

  mongo-init:
    image: mongo:4.4
    restart: on-failure
    depends_on:
      - attendance-db
    network_mode: "service:attendance-db"
    entrypoint: ["mongo", "--eval", "try{rs.status()}catch(e){rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27017'}]})}"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "service:attendance-db"
    environment:
      - DATABASE_URL=mongodb://127.0.0.1:27017/Presensi?replicaSet=rs0&directConnection=true
      - AUTH_SECRET=${AUTH_SECRET:-nrehivnajrnauirgnuoaeaovnraviyerbvain}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://100.69.98.9:5010}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      - attendance-db
    restart: unless-stopped

volumes:
  mongo_data_v6:
  uploads_data:
