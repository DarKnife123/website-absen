services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5010:5010"
    environment:
      - DATABASE_URL=mongodb://mongo:27017/Presensi?replicaSet=rs0&directConnection=true
      - AUTH_SECRET=${AUTH_SECRET:-nrehivnajrnauirgnuoaeaovnraviyerbvain}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:5010}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:6
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "5110:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: >
        mongosh --quiet --eval "
        try {
          rs.status();
        } catch(e) {
          if (e.codeName === 'NotYetInitialized') {
            rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]});
          }
        }
        db.adminCommand('ping').ok
        "
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo_data:
  mongo_init:
  uploads_data:
