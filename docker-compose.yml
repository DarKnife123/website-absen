version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5010:5010"
    environment:
      - DATABASE_URL=mongodb://mongo:27017/Presensi?replicaSet=rs0
      - AUTH_SECRET=${AUTH_SECRET:-nrehivnajrnauirgnuoaeaovnraviyerbvain}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:5010}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      mongo_setup:
        condition: service_completed_successfully

  mongo:
    image: mongo:6
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "5110:27017"
    volumes:
      - mongo_data:/data/db

  mongo_setup:
    image: mongo:6
    depends_on:
      - mongo
    command:
      - bash
      - -c
      - |
        echo "Waiting for MongoDB to start..."
        until mongosh --host mongo:27017 --eval 'print("ready")'; do
          sleep 2
        done
        
        echo "MongoDB is up. Checking replica set..."
        mongosh --host mongo:27017 --eval '
        try {
          var status = rs.status();
          if (status.ok === 1) {
            print("Replica set is fully initialized and operational.");
          } else {
            print("Replica set status anomaly: ", JSON.stringify(status));
          }
        } catch (err) {
          if (err.codeName === "NotYetInitialized") {
            print("Initiating replica set rs0...");
            var res = rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "mongo:27017" }]
            });
            print("Initiate response: " + JSON.stringify(res));
          } else {
            print("Error checking status: " + err.message);
            // If it failed due to some other error, sleep to avoid instant exit
            sleep(2000);
          }
        }'

volumes:
  mongo_data:
  uploads_data:
